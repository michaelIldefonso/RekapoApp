name: Build Android (Dev)

on:
  push:
    branches: [dev, develop]
    paths-ignore:
      - '**.md'
      - 'firebase-config/**'
  pull_request:
    branches: [dev, develop, main]
    paths-ignore:
      - '**.md'
      - 'firebase-config/**'
  workflow_dispatch:  # Allow manual trigger too

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK (Dev)
        run: eas build --platform android --profile development --non-interactive --local
        env:
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
          FIREBASE_CONFIG_URL: ${{ secrets.FIREBASE_CONFIG_URL }}

      - name: Rename APK
        run: mv build-*.apk RekapoApp-dev.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-apk
          path: RekapoApp-dev.apk
          retention-days: 7
